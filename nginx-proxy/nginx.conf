events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;
    client_max_body_size 50M;   # Allow large file uploads (profile photos, PDFs etc.)

    # ── Redirect HTTP → HTTPS ─────────────────────────────────────────────────
    server {
        listen 80;
        server_name YOUR_DOMAIN.com www.YOUR_DOMAIN.com;

        # Required for Let's Encrypt certificate renewal
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTPS Main Server ─────────────────────────────────────────────────────
    server {
        listen 443 ssl;
        server_name YOUR_DOMAIN.com www.YOUR_DOMAIN.com;

        ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN.com/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;

        # ── Frontend React App ────────────────────────────────────────────────
        location / {
            proxy_pass         http://frontend:80;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # ── Backend REST API ──────────────────────────────────────────────────
        location /api/ {
            proxy_pass         http://backend:5000;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }

        # ── Socket.io (Connect Sphere real-time chat) ─────────────────────────
        location /socket.io/ {
            proxy_pass         http://backend:5000;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_cache_bypass $http_upgrade;
        }

        # ── MinIO Public File Access ──────────────────────────────────────────
        # Files stored in MinIO are served at /files/* in the browser
        # MINIO_PUBLIC_URL in .env should be: https://YOUR_DOMAIN.com/files
        location /files/ {
            proxy_pass         http://minio:9000/tnp-uploads/;
            proxy_set_header   Host minio:9000;
            proxy_set_header   X-Real-IP $remote_addr;
            # Cache static files (images, PDFs) aggressively
            proxy_cache_valid  200 1d;
            add_header         Cache-Control "public, max-age=86400";
        }
    }
}
