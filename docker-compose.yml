services:
  # ── MongoDB ─────────────────────────────────────────────────────────────────
  mongo:
    image: mongo:7
    container_name: tmp_mongo
    restart: unless-stopped
    networks:
      - tmp-net
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: [ "CMD", "mongosh", "--eval", "db.adminCommand('ping')" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: tmp_redis
    restart: unless-stopped
    networks:
      - tmp-net
    volumes:
      - redis-data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Backend ──────────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tmp_backend
    restart: unless-stopped
    networks:
      - tmp-net
    env_file:
      - .env
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongo:27017/tmp_db
      - REDIS_URL=redis://redis:6379
      - FRONTEND_ORIGIN=http://localhost:3000
      - NODE_ENV=development
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost:5000/api/v1/health" ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── Frontend ─────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: tmp_frontend
    restart: unless-stopped
    networks:
      - tmp-net
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "9000:9000" # API port (only expose to host during dev; drop this in production, keep internal-only)
      - "9001:9001" # Web console
    volumes:
      - minio-data:/data
    networks: [ tmp-net ]
  # ── Nginx Proxy (placeholder — configured fully in deployment phase) ──────────
  # nginx-proxy:
  #   image: nginx:alpine
  #   container_name: tmp_nginx_proxy
  #   ...  (will be wired in the final deployment phase)

  # ── Networks ──────────────────────────────────────────────────────────────────
networks:
  tmp-net:
    driver: bridge

# ── Volumes ───────────────────────────────────────────────────────────────────
volumes:
  mongo-data:
  redis-data:
  minio-data:
